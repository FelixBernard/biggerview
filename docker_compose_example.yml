name: biggerview
version: '0.9'

services:
  web:
    image: biggerviewtest
    ports:
      - "3298:8080"
    environment:
      DB_HOST: db
      DB_USER: flaskuser
      DB_PASSWORD: deinpasswort
      DB_NAME: biggerview
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    # restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpasswort
      MYSQL_DATABASE: biggerview
      MYSQL_USER: flaskuser
      MYSQL_PASSWORD: deinpasswort
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data: