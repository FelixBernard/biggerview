name: biggerview
version: '0.9'

services:
  web:
    build: .
    ports:
      - "3298:8080"
    environment:
      DB_HOST: localhost
      DB_USER: flaskuser
      DB_PASSWORD: deinpasswort
      DB_NAME: biggerview
    depends_on:
      - db
    # restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpasswort
      MYSQL_DATABASE: biggerview
      MYSQL_USER: flaskuser
      MYSQL_PASSWORD: deinpasswort
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data: